name: Prerelease Development Build

on:
  push:
    tags:
      - 'v*-dev*'  # Matches tags like v4.12.0-dev2, v1.2.3-dev-4, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: actions/checkout@v3
        with:
          ref: development  # Still builds from development branch
          fetch-depth: 0

      - name: Cache Gradle and wrapper
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build 64-bit Debug APKs
        run: |
          bash ./gradlew assembleTempusDebug
          bash ./gradlew assembleDegoogledDebug

      - name: Sign Tempus Debug APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/tempus/debug
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS_GITHUB }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD_GITHUB }}
        env:
           BUILD_TOOLS_VERSION: "35.0.0"

      - name: Sign Degoogled Debug APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/degoogled/debug
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS_GITHUB }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD_GITHUB }}
        env:
           BUILD_TOOLS_VERSION: "35.0.0"

      - name: Prepare APKs
        run: |
          mkdir -p prerelease-artifacts
          
          # Copy and rename Tempus APK with version from tag
          # cp app/build/outputs/apk/tempus/debug/*arm64-v8a*.apk ./prerelease-artifacts/app-tempus-arm64-v8a-${{ github.ref_name }}.apk 2>/dev/null || true
          
          # Copy and rename Degoogled APK with version from tag
          # cp app/build/outputs/apk/degoogled/debug/*arm64-v8a*.apk ./prerelease-artifacts/app-degoogled-arm64-v8a-${{ github.ref_name }}.apk 2>/dev/null || true
          
          cp "${{ steps.sign_tempus.outputs.signedReleaseFile }}" ./prerelease-artifacts/app-tempus-arm64-v8a-${{ github.ref_name }}.apk
          cp "${{ steps.sign_degoogled.outputs.signedReleaseFile }}" ./prerelease-artifacts/app-degoogled-arm64-v8a-${{ github.ref_name }}.apk

          echo "Prepared APKs with version: ${{ github.ref_name }}"

      - name: Create Prerelease
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Development prerelease from commit ${{ github.sha }}
            
            **Note:** This is a prerelease and may be unstable. We will add a link so you can capture debug logs to help us find issues/bugs.
            **Branch:** development
            **Architecture:** 64-bit only (arm64-v8a)
            **Build type:** Debug (signed with release keystore)
          draft: false
          prerelease: true
          files: ./prerelease-artifacts/*.apk